name: HACS Validation
on:
  push:
  pull_request:
  schedule:
    - cron: "48 0 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485  # main @ 2026-04
        with:
          category: integration
          # brands check needs either a PR to home-assistant/brands or local brand
          # assets. Tracked in #1; skip for now so the rest of the suite runs.
          ignore: brands
